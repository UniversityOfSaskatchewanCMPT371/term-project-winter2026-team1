name: BACKEND

services:
  ubuntu_vm:
    build: ./supabase/
    restart: unless-stopped
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - .:${PWD}
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: ${PWD}
    # Healthcheck to verify that supabase is pingable
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:54321/auth/v1/health"]
      interval: 10s
      timeout: 10s
      retries: 25
      start_period: 30s
  powersync:
    build: ./powersync/
    restart: unless-stopped
    stop_grace_period: 1m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/probes/liveness').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 1s
      retries: 15
    depends_on:
      ubuntu_vm:
        condition: service_healthy
    ports:
      - "8080:8080"  # forward vm to windows
    extra_hosts:
      - "host.docker.internal:host-gateway" # access the network mode host on the vm
    
    
