<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="add-page.css">
    </head>

    <body>
        <div id="pageTitle">
            <h1>Add Data</h1>
        </div>

        <div id="tablesList">
            <div class="tableType">

                <h2 class="tableName">Site</h2>
                <input id="Site-name" placeholder="name">
                <input id="Site-borden" placeholder="borden">

                <button id="Site-saveButton" class="saveButton">Save</button>
            </div>


            <div class="tableType">

                <h2 class="tableName">Area</h2>
                <input id="Area-name" placeholder="name">
                
                <button id="Area-saveButton" class="saveButton">Save</button>
            </div>

            <div class="tableType">

                <h2 class="tableName">Unit</h2>
                <input id="Unit-name" placeholder="name">
                <input id="Unit-site id" placeholder="site id">

                <button id="Unit-saveButton" class="saveButton">Save</button>
            </div>
            
            <div class="tableType">

                <h2 class="tableName">Level</h2>
                <input id="Level-name" placeholder="name">
                <input id="Level-unit id" placeholder="unit id">
                <input id="Level-parent id" placeholder="parent id">
                <input id="Level-upper limit" placeholder="upper limit">
                <input id="Level-lower limit" placeholder="lower limit">

                <button id="Level-saveButton" class="saveButton">Save</button>
            </div>


        </div>
    </body>
</html>
