name: Nightly Master Suite
on:
  schedule:
    - cron: '0 6 * * *'

jobs:
  docker-build-test:
    uses: ./.github/workflows/docker-build-test.yml
    
  flutter-integration:
    uses: ./.github/workflows/flutter-integration.yml

  flutter-linter:
    uses: ./.github/workflows/flutter-linter.yml
  
  unit-tests:
    uses: ./.github/workflows/flutter.yml
  
  system-tests:
    uses: ./.github/system-test.yml

  # 2. FAN IN: The Summary Job
  summarize-and-wiki:
    # This job ONLY runs after all the ones listed below finish
    needs: [run-api-tests, run-ui-tests, run-database-tests] 
    # Optional: Run this even if some tests failed (highly recommended)
    if: always() 
    runs-on: ubuntu-latest

    steps:
      # Download ALL artifacts uploaded by the jobs above into a folder
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-results-folder
          merge-multiple: true # This dumps all XMLs into the same directory!

      - name: Parse XMLs and Generate Summary
        run: |
          # Here, you run a script that loops through the 'all-results-folder'
          # reads api-results.xml, ui-results.xml, etc., and builds one big Markdown file.
          python generate_combined_summary.py
          
      - name: Checkout Wiki Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.WIKI_PAT }}

      - name: Publish to Wiki
        run: |
          cp Combined-Summary.md wiki/Nightly-Test-Summary.md
          cd wiki
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Nightly-Test-Summary.md
          git commit -m "docs: Update nightly test summary" || echo "No changes"
          git push