name: Flutter test

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: string

permissions:
    checks: write
    pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 
          
      - name: Start docker compose 
        uses: hoverkraft-tech/compose-action@4894d2492015c1774ee5a13a95b1072093087ec3 # v2.5.0
        with:
          # Additional options to pass to `docker` command.
          docker-up-flags: "--build"

          # Path to compose file(s). It can be a list of files. It can be absolute or relative to the current working directory (cwd).
          # Default: `./docker-compose.yml`
          compose-file: ./backend/docker-compose.yml

      # Set flutter working-directory
      - name: Set flutter workdir
        run: flutter config --build-dir=./
        working-directory: ./frontend/search_cms

      # Verify testing is added
      - name: Flutter source add
        run: flutter pub add dev:test
        working-directory: ./frontend/search_cms
        
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./frontend/search_cms
      
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_EN

      - name: Generate test_report file
        run: mkdir test-results

      - name: Run tests 
        run: flutter test --machine > test-results/flutter_report_${{ env.TIMESTAMP }}.json
        working-directory: ./frontend/search_cms


      # Upload out flutter test to the artifacts
      - uses: actions/upload-artifact@v4
        with:
          # Name of the artifact to upload.
          # Optional. Default is 'artifact'
          name: flutter_report_${{ env.TIMESTAMP }}
          path: flutter_report_${{ env.TIMESTAMP }}.json
      
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: (!cancelled())
        with:
          files: |
            test-results/flutter_report_${{ env.TIMESTAMP }}.json
