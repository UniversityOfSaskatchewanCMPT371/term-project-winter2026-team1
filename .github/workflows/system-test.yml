name: Flutter System Test

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
      environment:
        required: true
        default: 'staging'
        type: string

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    # Runs on ubuntu latest, this means the display driver does not test mac or windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a recent Node.js version

      - name: Install Appium Server
        run: npm install -g appium

      - name: Install Appium novawindows
        run: appium driver install --source=npm appium-novawindows-driver && sleep 30

      - name: Start Appium Server in background
        run: |
          appium &
          sleep 15

      - name: Initialize java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Aid in dependency chain, this will use install-dependencies to cover issues
      - uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: latest
          install-dependencies: true
    
      # Verify testing is added
      - name: Flutter source add
        run: flutter pub add dev:test
        working-directory: ./frontend/search_cms
      
      # Install pub dependencies from main flutter directory 'search_cms'
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./frontend/search_cms
      
      - name: Initialize windows desktop EXE file
        run: flutter config --enable-windows-desktop
        working-directory: ./frontend/search_cms
      
      - name: Build windoes desktop exe file
        run: flutter build windows
        working-directory: ./frontend/search_cms
        env:
          # URL for flutter initialization
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}

      # for testing / sanity checks
      - name: Ensure containers are running
        run: docker ps -a
      
      # Initializes timestamp for the artifact files being generated
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV
      
      # Adding junitreport to convert json test result to jUnit.
      - name: Flutter add junitreport
        run: flutter pub global activate junitreport
        working-directory: ./frontend/search_cms

      - name: Build with Maven
        run: mvn clean test
        working-directory: ./system-maven-tests/system-test-app

      # runa headless xvfb to initiate flutter integration tests

