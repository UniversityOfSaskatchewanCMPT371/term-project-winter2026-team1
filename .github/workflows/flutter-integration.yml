name: Flutter Integration Test

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
      environment:
        required: true
        default: 'staging'
        type: string

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    # Runs on ubuntu latest, this means the display driver does not test mac or windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 
      
      # Aid in dependency chain, this will use install-dependencies to cover issues
      - uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: latest
          install-dependencies: true

      - name: Start docker compose 
        uses: hoverkraft-tech/compose-action@4894d2492015c1774ee5a13a95b1072093087ec3 # v2.5.0
        with:
          # Additional options to pass to `docker` command.
          up-flags: "--build"
          
          # Path to compose file(s). It can be a list of files. It can be absolute or relative to the current working directory (cwd).
          # Default: `./docker-compose.yml`
          compose-file: ./backend/docker-compose.yml

      # Initialize the linux environment
      - name: setup linux flutter platform
        run: flutter create --platforms=linux .
        working-directory: ./frontend/search_cms
      # Set flutter working-directory
    
      # Verify testing is added
      - name: Flutter source add
        run: flutter pub add dev:test
        working-directory: ./frontend/search_cms
      
      # Install pub dependencies from main flutter directory 'search_cms'
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./frontend/search_cms

      # runs a ping on supabase every 5 seconds until passes
      - name: Ensure Supabase is ready before running tests
        run: |
          echo "Waiting for Supabase on port 54321..."
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:54321/auth/v1/health > /dev/null 2>&1; then
              echo "Supabase is ready after $i attempts"
              exit 0
            fi
            echo "Attempt $i/30 - not ready, waiting 5s..."
            sleep 5
          done
          echo "ERROR: Supabase failed to start within 150 seconds"
          exit 1

      # for testing / sanity checks
      - name: Ensure containers are running
        run: docker ps -a

      # Install xvfb (headless display) and all it's dependencies
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-xserver-utils
          sudo apt-get install -y cmake ninja-build clang libgtk-3-dev
      
      # Initializes timestamp for the artifact files being generated
      - name: Set Timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV
      
      # Adding junitreport to convert json test result to jUnit.
      - name: Flutter add junitreport
        run: flutter pub global activate junitreport
        working-directory: ./frontend/search_cms

      # runa headless xvfb to initiate flutter integration tests
      - name: Run headless test
        uses: coactions/setup-xvfb@v1
        with:
          run: |
           bash -c "mkdir -p test-results"
           bash -c "flutter test integration_test/end_to_end_test.dart -d linux --machine | tojunit --output test-results/end_to_end_${{ env.TIMESTAMP }}.xml"
           bash -c "flutter test integration_test/smoke_test.dart -d linux --machine | tojunit --output test-results/smoke_${{ env.TIMESTAMP }}.xml"
           bash -c "flutter test integration_test/sys_login_test.dart -d linux --machine --dart-define=TEST_EMAIL=$TEST_EMAIL --dart-define=TEST_PASSWORD=$TEST_PASSWORD | tojunit --output test-results/sys_login_${{ env.TIMESTAMP }}.xml"
           bash -c "flutter test integration_test/sys_add_data_test.dart -d linux --machine | tojunit --output test-results/sys_add_data_${{ env.TIMESTAMP }}.xml"
          working-directory: ./frontend/search_cms
        env:
          API_BASE_URL: http://localhost:8080
          # Login credentials for sys_login_test.dart
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_SYSLOG_USER_PASSWORD }}
      # Run integration tests in headless Chrom

      # Upload out flutter test to the artifacts
      - uses: actions/upload-artifact@v4
        with:
          # Name of the artifact to upload.
          # Optional. Default is 'artifact'
          name: flutter_int_test_report_${{ env.TIMESTAMP }}
          path: frontend/search_cms/test-results/*.xml

      # Upload Test reports to the pull request.
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: 'frontend/search_cms/test-results/*.xml'
          include_passed: True
          fail_on_failure: True
