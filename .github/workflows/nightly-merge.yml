name: 'Nightly Merge'

on:
  #schedule:
    #- cron:  '0 6 * * *'
  push:
    branches: [ "develop", "main", "bug/nightly-merge-pr" ]
      
jobs:
  nightly-merge:

    runs-on: ubuntu-latest # Just use githubs runner for this, no need for self hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full clone necessary for proper merge

    # Add versioning
    - name: Set Version String
      id: version
      run: echo "DATE_VER=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

    # reset develop off of main to highlight commit changes between them
    - name: Prepare changes for PR
      run: |
        BRANCH_NAME="nightly-merge-v$DATE_VER"
        git checkout develop
        git pull origin develop
        git checkout -b "$BRANCH_NAME"
        git push origin "$BRANCH_NAME"
    # Uses a marketplace gh action that merges the develop to main
    # This action creates a PR instead of doing a direct push
    - name: Create Pull Request to Main
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        base: main
        branch: nightly-merge-v${{ env.DATE_VER }}
        title: 'Nightly Merge: v${{ env.DATE_VER }}'
        body: 'Automated nightly merge for version ${{ env.DATE_VER }}. This PR will auto-merge once all status checks pass.'
        commit-message: 'Automated nightly merge v${{ env.DATE_VER }}'
        delete-branch: false
  
