name: 'Nightly Merge'

on:
  schedule:
    - cron:  '0 6 * * *'

jobs:

  env:
    RUN_TYPE: ${{ inputs.run_type || 'default' }}
    ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix || 'pr' }}

  nightly-merge:

    runs-on: ubuntu-latest # Just use githubs runner for this, no need for self hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full clone necessary for proper merge
    - name: Install github cli
      run: sudo apt install -y gh

    - name: Authenticate github
      run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      
    # Add versioning
    - name: Set Version String
      id: version
      run: echo "DATE_VER=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

    - name: Create branch name
      id: vars
      run: echo "BRANCH=nightly-merge-v${{ steps.version.outputs.DATE_VER }}" >> $GITHUB_OUTPUT


    - name: Merge XML reports
      run: |
        echo "<nightlyReport>" > nightly.xml
        for f in artifacts/**/report.xml; do
          sed '1{/^<?xml/d}' "$f" >> nightly.xml
        done
        echo "</nightlyReport>" >> nightly.xml

    # reset develop off of main to highlight commit changes between them
    
    - name: Publish report to GitHub Wiki
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh repo clone "${{ github.repository }}.wiki" wiki
        cd wiki

        cp ../nightly.xml Nightly-Report.xml

        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add Nightly-Report.xml
        git commit -m "Nightly report $(date -u +%Y-%m-%d)" || exit 0
        git push

