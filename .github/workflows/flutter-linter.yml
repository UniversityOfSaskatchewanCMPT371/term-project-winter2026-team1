name: Flutter Lint Check

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: string
  workflow_call:

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Set flutter working-directory
      - name: Set flutter workdir
        run: flutter config --build-dir=./
        working-directory: ./frontend/search_cms

      # Verify testing is added
      - name: Flutter source add
        run: flutter pub add dev:test
        working-directory: ./frontend/search_cms
        
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./frontend/search_cms
      
      - name: Analyze project source
        run: flutter analyze --fatal-infos
        working-directory: ./frontend/search_cms
